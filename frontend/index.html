<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Note AI - Prise de note vocale avec IA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }
        
        .main-content {
            padding: 30px;
        }
        
        .voice-controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn-primary {
            background: linear-gradient(to right, #ff9a9e 0%, #fad0c4 100%);
            color: white;
        }
        
        .btn-secondary {
            background: linear-gradient(to right, #a8edea 0%, #fed6e3 100%);
            color: #333;
        }
        
        .btn-danger {
            background: linear-gradient(to right, #ff7e5f 0%, #feb47b 100%);
            color: white;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn i {
            font-size: 1.3rem;
        }
        
        .status {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        
        .status.listening {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .status.processing {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
            display: block;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .notes-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
        }
        
        .notes-section h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .note-item {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            border-left: 4px solid #4facfe;
        }
        
        .note-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        
        .note-title {
            font-weight: 600;
            color: #2c3e50;
            font-size: 1.2rem;
        }
        
        .note-timestamp {
            font-size: 0.9rem;
            color: #95a5a6;
        }
        
        .note-content {
            color: #34495e;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        
        .ai-suggestions {
            background: #e8f4fd;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
            border-left: 3px solid #3498db;
        }
        
        .ai-suggestions h3 {
            color: #2c3e50;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .ai-suggestions ul {
            padding-left: 20px;
        }
        
        .ai-suggestions li {
            margin-bottom: 8px;
            color: #2c3e50;
        }
        
        .project-type-selector {
            margin: 20px 0;
        }
        
        .project-type-selector label {
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
            color: #2c3e50;
        }
        
        .project-type-selector select {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            width: 100%;
            background: white;
        }
        
        .agent-status {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .agent-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            flex: 1;
            min-width: 150px;
            text-align: center;
            border: 2px solid #e9ecef;
            transition: all 0.3s ease;
        }
        
        .agent-card.active {
            border-color: #4facfe;
            background: #e8f4fd;
        }
        
        .agent-card h4 {
            margin-bottom: 10px;
            color: #2c3e50;
        }
        
        .agent-card .status-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        .status-dot.active {
            background: #28a745;
        }
        
        .status-dot.working {
            background: #ffc107;
            animation: pulse 1.5s infinite;
        }
        
        .status-dot.error {
            background: #dc3545;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 0.9rem;
            border-top: 1px solid #eee;
            margin-top: 30px;
        }
        
        @media (max-width: 600px) {
            .header h1 {
                font-size: 2rem;
            }
            
            .main-content {
                padding: 20px;
            }
            
            .voice-controls {
                gap: 15px;
            }
            
            .btn {
                padding: 12px 20px;
                font-size: 1rem;
            }
        }
        
        .loading-dots {
            display: inline-block;
        }
        
        .loading-dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }
        
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }
    .note-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .note-commands {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            align-items: center;
        }

        .command-input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .command-input:focus {
            outline: none;
            border-color: #4facfe;
            box-shadow: 0 0 0 2px rgba(79, 172, 254, 0.2);
        }

        .command-btn {
            padding: 10px 16px;
            border: 1px solid #ddd;
            background: white;
            color: #333;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .command-btn:hover {
            background: #f8f9fa;
        }

        .command-btn:active {
            transform: scale(0.98);
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 0.9rem;
        }

        .btn-outline {
            border: 1px solid #ddd;
            background: white;
            color: #333;
        }

        .btn-outline:hover {
            background: #f8f9fa;
        }

        .note-item.selected {
            border: 2px solid #4facfe;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.2);
        }
</style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎤 Voice Note AI</h1>
            <p>Prise de note vocale avec intelligence artificielle multi-agents</p>
        </div>
        
        <div class="main-content">
            <div class="voice-controls">
                <button id="startBtn" class="btn btn-primary">
                    <i class="fas fa-microphone"></i>
                    Démarrer l'enregistrement
                </button>
                
                <button id="stopBtn" class="btn btn-secondary" disabled>
                    <i class="fas fa-stop"></i>
                    Arrêter l'enregistrement
                </button>
                
                <button id="clearBtn" class="btn btn-danger">
                    <i class="fas fa-trash"></i>
                    Effacer les notes
                </button>
                
                <button id="continuousToggle" class="btn btn-outline">
                    <i class="fas fa-redo"></i>
                    Écoute continue
                </button>
            </div>
            
            <div id="status" class="status">
                <span id="statusText">Écoute en cours...</span>
                <span class="loading-dots"></span>
            </div>
            
            <div class="project-type-selector">
                <label for="projectType">Type de projet :</label>
                <select id="projectType">
                    <option value="general">Note générale</option>
                    <option value="youtube">Vidéo YouTube</option>
                    <option value="game">Jeu vidéo</option>
                    <option value="business">Projet business</option>
                    <option value="creative">Projet créatif</option>
                </select>
            </div>
            
            <div class="agent-status" id="agentStatus">
                <!-- Les agents seront ajoutés dynamiquement -->
            </div>
            
            <div class="notes-section">
                <h2><i class="fas fa-sticky-note"></i> Mes notes</h2>
                <div id="notesContainer">
                    <!-- Les notes seront ajoutées dynamiquement -->
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>Voice Note AI - Créé avec ❤️ pour améliorer votre productivité vocale</p>
        </div>
    </div>

    <!-- Font Awesome pour les icônes -->
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    
    <!-- Configuration -->
    <script src="config.js"></script>
    
    <!-- Frontend Script -->
    <script src="simple-script.js"></script>
</body>
</html>
