<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Note AI — Workspace</title>
    <style>
        :root {
            --bg-1: #0f1221;
            --bg-2: #1a1f3b;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-strong: rgba(255, 255, 255, 0.14);
            --line: rgba(255, 255, 255, 0.18);
            --text: #eef2ff;
            --muted: #b8c0ff;
            --accent: #6ea8fe;
            --ok: #2bc48a;
            --warn: #ffca61;
            --danger: #ff7d7d;
            --radius: 14px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Segoe UI", system-ui, sans-serif;
            color: var(--text);
            background:
                radial-gradient(1200px 800px at 15% -10%, #2f4eff 0%, transparent 55%),
                radial-gradient(1000px 700px at 100% 0%, #7b2fff 0%, transparent 45%),
                linear-gradient(140deg, var(--bg-1), var(--bg-2));
            min-height: 100vh;
        }

        .workspace {
            width: min(1500px, 96vw);
            margin: 16px auto;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 16px;
        }

        .glass {
            background: var(--glass);
            border: 1px solid var(--line);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: var(--radius);
        }

        .sidebar {
            padding: 14px;
            min-height: calc(100vh - 32px);
            position: sticky;
            top: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .brand {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 8px;
            border-radius: 10px;
            background: var(--glass-strong);
        }

        .brand h1 {
            font-size: 15px;
            margin: 0;
            letter-spacing: .2px;
        }

        .btn-icon {
            border: 1px solid var(--line);
            background: transparent;
            color: var(--text);
            width: 30px;
            height: 30px;
            border-radius: 8px;
            cursor: pointer;
        }

        .search {
            width: 100%;
            border: 1px solid var(--line);
            background: rgba(255,255,255,0.06);
            color: var(--text);
            border-radius: 10px;
            padding: 10px 12px;
            outline: none;
        }

        .sidebar-section-title {
            margin: 4px 2px;
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .8px;
        }

        .tree {
            max-height: 56vh;
            overflow: auto;
            padding-right: 4px;
        }

        .tree-item {
            padding: 8px 10px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .tree-item:hover { background: rgba(255,255,255,0.08); }
        .tree-item.active { background: rgba(110,168,254,0.22); border: 1px solid rgba(110,168,254,0.45); }

        .tree-children { margin-left: 14px; border-left: 1px dashed rgba(255,255,255,0.2); padding-left: 8px; }

        .main {
            min-height: calc(100vh - 32px);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .breadcrumb {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            color: var(--muted);
            font-size: 13px;
        }

        .chip {
            border: 1px solid var(--line);
            background: rgba(255,255,255,0.05);
            color: var(--text);
            border-radius: 999px;
            padding: 6px 10px;
            font-size: 12px;
        }

        .view-switch {
            display: flex;
            gap: 6px;
        }

        .view-btn {
            border: 1px solid var(--line);
            background: rgba(255,255,255,0.05);
            color: var(--text);
            border-radius: 9px;
            padding: 6px 10px;
            cursor: pointer;
            font-size: 12px;
        }

        .view-btn.active { background: rgba(110,168,254,0.22); border-color: rgba(110,168,254,0.5); }

        .note-shell {
            padding: 16px;
        }

        .note-title {
            width: 100%;
            border: 0;
            background: transparent;
            color: var(--text);
            font-size: 30px;
            font-weight: 700;
            outline: none;
            margin-bottom: 8px;
        }

        .properties {
            display: grid;
            grid-template-columns: repeat(4, minmax(120px, 1fr));
            gap: 8px;
            margin-bottom: 14px;
        }

        .prop {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 8px;
            font-size: 12px;
        }

        .prop label {
            display: block;
            color: var(--muted);
            margin-bottom: 4px;
            font-size: 11px;
        }

        .prop input, .prop select {
            width: 100%;
            border: 0;
            outline: none;
            background: transparent;
            color: var(--text);
            font-size: 13px;
        }

        .editor {
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 12px;
            background: rgba(255,255,255,0.03);
            min-height: 280px;
        }

        .block {
            display: grid;
            grid-template-columns: 24px 1fr;
            gap: 8px;
            align-items: start;
            padding: 6px 0;
            border-radius: 8px;
        }

        .block:hover { background: rgba(255,255,255,0.04); }

        .handle {
            width: 20px;
            height: 20px;
            border: 1px dashed var(--line);
            border-radius: 6px;
            font-size: 11px;
            color: var(--muted);
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        .block-content {
            min-height: 24px;
            outline: none;
            color: var(--text);
            padding: 2px 0;
        }

        .block-content[data-placeholder]:empty::before {
            content: attr(data-placeholder);
            color: #8e99d6;
        }

        .proposal {
            margin-top: 14px;
            border: 1px solid rgba(255,202,97,0.5);
            background: rgba(255,202,97,0.12);
            border-radius: 12px;
            padding: 12px;
            display: none;
        }

        .proposal.visible { display: block; }

        .proposal h4 {
            margin: 0 0 8px;
            font-size: 14px;
        }

        .diff {
            font-family: Consolas, monospace;
            font-size: 12px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 8px;
            max-height: 180px;
            overflow: auto;
            white-space: pre-wrap;
        }

        .proposal-actions {
            margin-top: 10px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            border: 1px solid var(--line);
            background: rgba(255,255,255,0.06);
            color: var(--text);
            border-radius: 10px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 13px;
        }

        .btn.ok { background: rgba(43,196,138,0.22); border-color: rgba(43,196,138,0.5); }
        .btn.danger { background: rgba(255,125,125,0.18); border-color: rgba(255,125,125,0.5); }

        .clarify {
            width: 100%;
            margin-top: 8px;
            border: 1px solid var(--line);
            background: rgba(255,255,255,0.05);
            color: var(--text);
            border-radius: 8px;
            padding: 8px;
        }

        .floating-listen {
            position: fixed;
            right: 18px;
            bottom: 18px;
            z-index: 2000;
            border-radius: 999px;
            padding: 10px 14px;
            border: 1px solid var(--line);
            background: var(--glass-strong);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
        }

        .pulse {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--warn);
            animation: pulse 1.4s infinite;
        }

        .status-bar {
            font-size: 12px;
            color: var(--muted);
            padding: 2px 4px;
        }

        @media (max-width: 980px) {
            .workspace { grid-template-columns: 1fr; }
            .sidebar { position: static; min-height: auto; }
            .properties { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <div class="workspace">
        <aside class="sidebar glass">
            <div class="brand">
                <h1>Voice Note AI</h1>
                <button id="newPageBtn" class="btn-icon">+</button>
            </div>
            <input id="searchInput" class="search" placeholder="Chercher une page..." />
            <div class="sidebar-section-title">Pages</div>
            <div id="pageTree" class="tree"></div>
        </aside>

        <main class="main glass">
            <div class="topbar">
                <div id="breadcrumb" class="breadcrumb"></div>
                <div class="view-switch">
                    <button class="view-btn active" data-view="list">Liste</button>
                    <button class="view-btn" data-view="table">Table</button>
                    <button class="view-btn" data-view="kanban">Kanban</button>
                </div>
            </div>

            <div class="status-bar" id="statusText">Prêt</div>

            <section class="note-shell">
                <input id="noteTitle" class="note-title" placeholder="Titre de la page" />

                <div class="properties">
                    <div class="prop">
                        <label>Tags</label>
                        <input id="propTags" placeholder="ex: hygiene, budget" />
                    </div>
                    <div class="prop">
                        <label>Statut</label>
                        <select id="propStatus">
                            <option value="idea">Idée</option>
                            <option value="in_progress">En cours</option>
                            <option value="done">Terminé</option>
                        </select>
                    </div>
                    <div class="prop">
                        <label>Date</label>
                        <input id="propDate" type="date" />
                    </div>
                    <div class="prop">
                        <label>Type</label>
                        <select id="propType">
                            <option value="general">Général</option>
                            <option value="youtube">YouTube</option>
                            <option value="game">Jeu vidéo</option>
                            <option value="business">Business</option>
                            <option value="creative">Créatif</option>
                        </select>
                    </div>
                </div>

                <div id="editor" class="editor"></div>

                <div id="proposal" class="proposal">
                    <h4>Proposition IA (confirmation requise)</h4>
                    <div id="proposalDiff" class="diff"></div>
                    <div class="proposal-actions">
                        <button id="applyProposal" class="btn ok">✅ Appliquer et détailler</button>
                        <button id="rejectProposal" class="btn danger">❌ Rejeter</button>
                    </div>
                    <input id="clarifyInput" class="clarify" placeholder="Préciser la requête IA..." />
                </div>
            </section>
        </main>
    </div>

    <div id="floatingListen" class="floating-listen">
        <span class="pulse" id="listenPulse"></span>
        <span id="listenLabel">Écoute continue: OFF</span>
    </div>

    <script src="config.js"></script>
    <script src="simple-script.js"></script>
</body>
</html>
